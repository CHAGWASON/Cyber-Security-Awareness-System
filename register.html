
<!DOCTYPE html>
<html>
<head>

<title>Student Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

</head>

<body style="background-image: url(bg3.png);">

<div class="container">

<div class="row justify-content-center mt-5">

<div class="col-md-6">

<div class="card shadow-lg">

<div class="card-header  text-primary text-center">

<h4>Registration</h4>

</div>

<div class="card-body">


<form method="POST">

<div class="mb-3">
<i class="fa fa-user"></i><label class="form-label">Full Name</label>
<input type="text" name="name" placeholder="Full-name" class="form-control" required>
</div>

<div class="mb-3">
<i class="fa fa-envelope"></i><label class="form-label">Email Address</label>
<input type="email" name="email" placeholder="email@" class="form-control" required>
</div>

<div class="mb-3">
<i class="fa fa-lock"></i><label class="form-label">Password</label>
<input type="password" placeholder="Password"name="password" class="form-control" required>
</div>

<div class="mb-3">
<i class="fa fa-university"></i><label class="form-label">Department</label>
<input type="text" name="department" placeholder="e.g Computer, Accounting, Physics" class="form-control" required>
</div>

<div class="mb-3">
<i class="fa fa-bar-chart"></i><label class="form-label">Level</label>
<select name="level" class="form-control">

<option>100 Level</option>
<option>200 Level</option>
<option>300 Level</option>
<option>400 Level</option>
<option>500 Level</option>

</select>
</div>

<div class="d-grid">
<a href="login.html" class="btn btn-primary "> Back Home</a>
</div>

</form>

</div>

<div class="card-footer text-center">

Already have an account?  
<a href="login.html">Login here</a>

</div>
<a href="index.html" class="btn btn-primary "> Back Home</a>
</div>

</div>

</div>

</div>

</body>
</html>
